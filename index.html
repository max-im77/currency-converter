<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Конвертер валют</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .converter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        .currency-card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 25px;
        }
        .currency-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .flag {
            font-size: 40px;
            margin-right: 15px;
        }
        .currency-info h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .currency-info p {
            color: #888;
            font-size: 14px;
        }
        .input-section {
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 10px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .quick-amounts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .quick-btn {
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 10px;
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .quick-btn:hover {
            background: #333;
            border-color: #667eea;
        }
        .result {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
            word-break: break-all;
        }
        .copy-btn {
            width: 100%;
            background: #667eea;
            border: none;
            border-radius: 6px;
            padding: 10px;
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .copy-btn:hover {
            background: #5568d3;
        }
        .copy-btn.copied {
            background: #4caf50;
        }
        .status {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💱 Конвертер валют</h1>
            <p style="color: #888;">Межбанковский курс</p>
        </div>

        <div class="converter-grid" id="converterGrid"></div>

        <div class="status" id="status">загрузка…</div>
    </div>

    <script>
        const currencies = [
            { code: 'USD', name: 'Доллар', flag: '🇺🇸', amounts: [100, 500, 1000, 5000, 10000] },
            { code: 'EUR', name: 'Евро', flag: '🇪🇺', amounts: [100, 500, 1000, 5000, 10000] },
            { code: 'GBP', name: 'Фунт', flag: '🇬🇧', amounts: [100, 500, 1000, 5000, 10000] },
            { code: 'JPY', name: 'Йена', flag: '🇯🇵', amounts: [1000, 5000, 10000, 50000, 100000] },
            { code: 'RUB', name: 'Рубль', flag: '🇷🇺', amounts: [1000, 5000, 10000, 50000, 100000] },
            { code: 'AED', name: 'Дирхам', flag: '🇦🇪', amounts: [100, 500, 1000, 5000, 10000] },
            { code: 'ZAR', name: 'Ранд', flag: '🇿🇦', amounts: [100, 500, 1000, 5000, 10000] }
        ];

        let rates = {};
        const grid = document.getElementById('converterGrid');
        const status = document.getElementById('status');

        async function loadRates() {
            try {
                const response = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
                const data = await response.json();
                rates = data.rates;
                rates.USD = 1;
                status.textContent = 'Курс обновлён';
                renderCards();
            } catch (error) {
                status.textContent = 'Ошибка загрузки курса';
                console.error(error);
            }
        }

        function renderCards() {
            grid.innerHTML = currencies.map((curr, idx) => {
                const amountsHtml = curr.amounts.map(amount => 
                    `<button class="quick-btn" onclick="quickConvert(${idx}, ${amount});">${amount}</button>`
                ).join('');

                return `
                    <div class="currency-card">
                        <div class="currency-header">
                            <div class="flag">${curr.flag}</div>
                            <div class="currency-info">
                                <h2>${curr.code}</h2>
                                <p>${curr.name}</p>
                            </div>
                        </div>
                        
                        <div class="input-section">
                            <input type="number" id="input-${idx}" placeholder="Сумма" value="100" min="0" oninput="convert()">
                            <div class="quick-amounts">${amountsHtml}</div>
                        </div>

                        <div class="result" id="result-${idx}">—</div>
                        <button class="copy-btn" onclick="copyResult(${idx})">Скопировано</button>
                    </div>
                `;
            }).join('');

            convert();
        }

        function quickConvert(idx, amount) {
            document.getElementById(`input-${idx}`).value = amount;
            convert();
        }

        function convert() {
            if (!rates.USD) return;

            currencies.forEach((curr, idx) => {
                const inputEl = document.getElementById(`input-${idx}`);
                const resultEl = document.getElementById(`result-${idx}`);
                const amount = parseFloat(inputEl.value) || 0;
                const rate = rates[curr.code] || 1;
                const usdAmount = amount / rate;
                
                currencies.forEach((targetCurr, targetIdx) => {
                    if (idx === targetIdx) return;
                    const converted = (usdAmount * rates[targetCurr.code]).toFixed(2);
                    const targetInput = document.getElementById(`input-${targetIdx}`);
                    targetInput.value = converted;
                });
            });

            // Обновляем результаты
            currencies.forEach((curr, idx) => {
                const input = parseFloat(document.getElementById(`input-${idx}`).value) || 0;
                document.getElementById(`result-${idx}`).textContent = input.toLocaleString('ru-RU', { maximumFractionDigits: 2 });
            });
        }

        function copyResult(idx) {
            const text = document.getElementById(`result-${idx}`).textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                btn.textContent = '✓ Скопировано';
                setTimeout(() => {
                    btn.textContent = 'Скопировано';
                }, 2000);
            });
        }

        loadRates();
        setInterval(loadRates, 60000); // Обновляем каждую минуту
    </script>
</body>
</html>
