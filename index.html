<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конвертер валют</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-secondary: white;
            --text-primary: #333;
            --text-secondary: #555;
            --border-color: #e0e0e0;
            --result-bg: #f5f5f5;
            --accent: #667eea;
        }

        body.dark-theme {
            --bg-primary: linear-gradient(135deg, #1e1e2e 0%, #2a2a3e 100%);
            --bg-secondary: #2a2a3e;
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --border-color: #444;
            --result-bg: #1e1e2e;
            --accent: #667eea;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s ease;
        }

        .container {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--text-primary);
            font-size: 24px;
        }

        .theme-toggle {
            width: 50px;
            height: 28px;
            background: var(--border-color);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 2px;
            transition: background 0.3s ease;
        }

        .theme-toggle:hover {
            background: var(--accent);
        }

        .toggle-circle {
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
        }

        body.dark-theme .toggle-circle {
            transform: translateX(22px);
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 13px;
        }

        input, select {
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .checkboxes-group {
            margin-bottom: 30px;
        }

        .currencies-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
            scroll-behavior: smooth;
        }

        .currencies-scroll::-webkit-scrollbar {
            height: 6px;
        }

        .currencies-scroll::-webkit-scrollbar-track {
            background: var(--result-bg);
            border-radius: 3px;
        }

        .currencies-scroll::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
        }

        .currency-btn {
            flex-shrink: 0;
            padding: 10px 15px;
            border: 2px solid var(--border-color);
            background: var(--bg-secondary);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .currency-btn:hover:not(:disabled) {
            border-color: var(--accent);
        }

        .currency-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .currency-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results {
            background: var(--result-bg);
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
            transition: background 0.3s ease;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--bg-secondary);
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 18px;
            font-weight: 500;
            transition: all 0.3s ease;
            color: var(--text-primary);
        }

        .result-item.hidden {
            display: none;
        }

        .currency-label {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .flag {
            font-size: 20px;
        }

        .currency-code { 
            color: var(--accent); 
            font-weight: 700; 
        }

        .amount { 
            color: var(--text-primary); 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💱 Конвертер валют</h1>
            <button class="theme-toggle" id="themeToggle">
                <div class="toggle-circle">☀️</div>
            </button>
        </div>
        
        <div class="input-row">
            <div class="input-group">
                <label>Сумма</label>
                <input type="number" id="amount" placeholder="100" value="100" min="0">
            </div>

            <div class="input-group">
                <label>Из валюты</label>
                <select id="fromCurrency">
                    <option value="USD">🇺🇸 USD</option>
                    <option value="EUR">🇪🇺 EUR</option>
                    <option value="GBP">🇬🇧 GBP</option>
                    <option value="JPY">🇯🇵 JPY</option>
                    <option value="RUB">🇷🇺 RUB</option>
                    <option value="CNY">🇨🇳 CNY</option>
                    <option value="CHF">🇨🇭 CHF</option>
                    <option value="AED">🇦🇪 AED</option>
                    <option value="ZAR">🇿🇦 ZAR</option>
                </select>
            </div>
        </div>

        <div class="checkboxes-group">
            <label>В какие валюты конвертировать</label>
            <div class="currencies-scroll" id="currenciesScroll">
                <button class="currency-btn active" data-currency="USD" data-id="to1">🇺🇸 USD</button>
                <button class="currency-btn active" data-currency="EUR" data-id="to2">🇪🇺 EUR</button>
                <button class="currency-btn active" data-currency="GBP" data-id="to3">🇬🇧 GBP</button>
                <button class="currency-btn active" data-currency="JPY" data-id="to4">🇯🇵 JPY</button>
                <button class="currency-btn" data-currency="RUB" data-id="to5">🇷🇺 RUB</button>
                <button class="currency-btn" data-currency="CNY" data-id="to6">🇨🇳 CNY</button>
                <button class="currency-btn" data-currency="CHF" data-id="to7">🇨🇭 CHF</button>
                <button class="currency-btn" data-currency="AED" data-id="to8">🇦🇪 AED</button>
                <button class="currency-btn" data-currency="ZAR" data-id="to9">🇿🇦 ZAR</button>
            </div>
            <input type="hidden" id="to1" value="USD" data-checked="true">
            <input type="hidden" id="to2" value="EUR" data-checked="true">
            <input type="hidden" id="to3" value="GBP" data-checked="true">
            <input type="hidden" id="to4" value="JPY" data-checked="true">
            <input type="hidden" id="to5" value="RUB" data-checked="false">
            <input type="hidden" id="to6" value="CNY" data-checked="false">
            <input type="hidden" id="to7" value="CHF" data-checked="false">
            <input type="hidden" id="to8" value="AED" data-checked="false">
            <input type="hidden" id="to9" value="ZAR" data-checked="false">
        </div>

        <div class="results" id="results">
            <div class="result-item" id="resultContainer1">
                <div class="currency-label">
                    <span class="flag">🇺🇸</span>
                    <span class="currency-code">USD</span>
                </div>
                <span class="amount" id="result1">0</span>
            </div>
            <div class="result-item" id="resultContainer2">
                <div class="currency-label">
                    <span class="flag">🇪🇺</span>
                    <span class="currency-code">EUR</span>
                </div>
                <span class="amount" id="result2">0</span>
            </div>
            <div class="result-item" id="resultContainer3">
                <div class="currency-label">
                    <span class="flag">🇬🇧</span>
                    <span class="currency-code">GBP</span>
                </div>
                <span class="amount" id="result3">0</span>
            </div>
            <div class="result-item" id="resultContainer4">
                <div class="currency-label">
                    <span class="flag">🇯🇵</span>
                    <span class="currency-code">JPY</span>
                </div>
                <span class="amount" id="result4">0</span>
            </div>
            <div class="result-item hidden" id="resultContainer5">
                <div class="currency-label">
                    <span class="flag">🇷🇺</span>
                    <span class="currency-code">RUB</span>
                </div>
                <span class="amount" id="result5">0</span>
            </div>
            <div class="result-item hidden" id="resultContainer6">
                <div class="currency-label">
                    <span class="flag">🇨🇳</span>
                    <span class="currency-code">CNY</span>
                </div>
                <span class="amount" id="result6">0</span>
            </div>
            <div class="result-item hidden" id="resultContainer7">
                <div class="currency-label">
                    <span class="flag">🇨🇭</span>
                    <span class="currency-code">CHF</span>
                </div>
                <span class="amount" id="result7">0</span>
            </div>
            <div class="result-item hidden" id="resultContainer8">
                <div class="currency-label">
                    <span class="flag">🇦🇪</span>
                    <span class="currency-code">AED</span>
                </div>
                <span class="amount" id="result8">0</span>
            </div>
            <div class="result-item hidden" id="resultContainer9">
                <div class="currency-label">
                    <span class="flag">🇿🇦</span>
                    <span class="currency-code">ZAR</span>
                </div>
                <span class="amount" id="result9">0</span>
            </div>
        </div>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-theme');
            themeToggle.querySelector('.toggle-circle').textContent = '🌙';
        }

        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeToggle.querySelector('.toggle-circle').textContent = isDark ? '🌙' : '☀️';
        });

        const currencyBtns = document.querySelectorAll('.currency-btn');
        const fromCurrency = document.getElementById('fromCurrency');

        currencyBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                btn.classList.toggle('active');
                const id = btn.getAttribute('data-id');
                const isActive = btn.classList.contains('active');
                document.getElementById(id).setAttribute('data-checked', isActive);
                convert();
            });
        });

        fromCurrency.addEventListener('change', () => {
            const selectedCurrency = fromCurrency.value;
            currencyBtns.forEach(btn => {
                const currency = btn.getAttribute('data-currency');
                if (currency === selectedCurrency) {
                    btn.disabled = true;
                    btn.classList.remove('active');
                    const id = btn.getAttribute('data-id');
                    document.getElementById(id).setAttribute('data-checked', 'false');
                } else {
                    btn.disabled = false;
                }
            });
            convert();
        });

        let rates = {};

        async function fetchRates() {
            try {
                const response = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
                const data = await response.json();
                rates = data.rates;
                rates.USD = 1;
                convert();
            } catch (error) {
                console.error('Ошибка:', error);
            }
        }

        const amountInput = document.getElementById('amount');

        function convert() {
            const amount = parseFloat(amountInput.value) || 0;
            const from = fromCurrency.value;
            if (!rates[from]) return;

            const amountInUSD = amount / rates[from];

            for (let i = 1; i <= 9; i++) {
                const input = document.getElementById(`to${i}`);
                const isChecked = input.getAttribute('data-checked') === 'true';
                const currency = input.value;
                const resultId = `result${i}`;
                const containerId = `resultContainer${i}`;
                const container = document.getElementById(containerId);

                if (currency === from) {
                    container.classList.add('hidden');
                } else if (isChecked && rates[currency]) {
                    const result = (amountInUSD * rates[currency]).toFixed(2);
                    document.getElementById(resultId).textContent = result;
                    container.classList.remove('hidden');
                } else {
                    container.classList.add('hidden');
                }
            }
        }

        amountInput.addEventListener('input', convert);
        fetchRates();
    </script>
</body>
</html>
